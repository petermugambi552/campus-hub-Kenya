<!DOCTYPE html>
<html>
<head>
    <title>Average Marks and Grade</title>
</head>
<body>

    <h2>Student Average and Grade</h2>

    <script>
        //student names
        var students=["david","peter","ken","chris","sheila"]

        // Student marks
        var marks = [80, 77, 88, 95, 68];

        var sum = 0;

        // Calculate total
        for (var i = 0; i < marks.length; i++)
        {
            sum += marks[i];
        

        // Calculate average
        var average = sum / marks.length;

        document.write("Average Marks = " + average + "<br>");

        // Determine grade
        if (average < 60)
        {
            document.write("Grade = F");
        }
        else if (average < 70)
        {
            document.write("Grade = D");
        }
        else if (average < 80)
        {
            document.write("Grade = C");
        }
        else if (average < 90)
        {
            document.write("Grade = B");
        }
        else if (average < 100)
        {
            document.write("Grade = A");
        }
        document.write(
            students[i]+":"+
            marks[i]+"marks,grade="+grade +"<br>"
        );
        sum+=marks[i];
    }

    </script>

</body>
</html>
